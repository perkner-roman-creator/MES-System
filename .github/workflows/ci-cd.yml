name: MiniMES CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies
      run: dotnet restore MiniMES.Api/
    
    - name: Build
      run: dotnet build MiniMES.Api/ --configuration Release --no-restore

  test-frontend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install dependencies
      run: |
        cd MiniMES.Client
        npm ci
    
    - name: Build frontend
      run: |
        cd MiniMES.Client
        npm run build
    
    - name: Install Playwright browsers
      run: |
        cd MiniMES.Client
        npx playwright install
    
    - name: Run E2E tests
      run: |
        cd MiniMES.Client
        npm run test:e2e || true

  build-and-push:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push API image
      uses: docker/build-push-action@v4
      with:
        context: ./MiniMES.Api
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/mini-mes-api:latest
          ${{ secrets.DOCKER_USERNAME }}/mini-mes-api:${{ github.sha }}
    
    - name: Build and push Client image
      uses: docker/build-push-action@v4
      with:
        context: ./MiniMES.Client
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/mini-mes-client:latest
          ${{ secrets.DOCKER_USERNAME }}/mini-mes-client:${{ github.sha }}

  security-scan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@0.18.0
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'
